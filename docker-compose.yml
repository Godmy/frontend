name: vibe-management-pro-frontend

services:
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_GRAPHQL_ENDPOINT=${VITE_GRAPHQL_ENDPOINT:-http://backend:8000/graphql/}
      - VITE_APP_ENV=${VITE_APP_ENV:-production}
      - VITE_APP_URL=${VITE_APP_URL:-http://localhost:3000}
      - VITE_DEBUG=${VITE_DEBUG:-false}
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/', (r) => r.statusCode && r.statusCode < 500 ? process.exit(0) : process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development service with hot-reload
  frontend-dev:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.dev
    ports:
      - "5173:5173"
      - "24678:24678"
    environment:
      - NODE_ENV=development
      - VITE_GRAPHQL_ENDPOINT=${VITE_GRAPHQL_ENDPOINT:-http://localhost:8000/graphql/}
      - VITE_APP_ENV=development
      - VITE_APP_URL=http://localhost:5173
      - VITE_DEBUG=true
      - CHOKIDAR_USEPOLLING=true
      - VITE_HMR_PORT=24678
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app/frontend
      - ../stylist-svelte:/app/stylist-svelte
      - /app/frontend/node_modules
      - /app/frontend/.svelte-kit
      - /app/stylist-svelte/node_modules
      - /app/stylist-svelte/dist
    networks:
      - app-network
    profiles:
      - dev

networks:
  app-network:
    driver: bridge
